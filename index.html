<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Horse Racing - Legend of Turf</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo" style="display:flex; flex-direction:column; gap:4px">
            Legend of Turf
            <span style="font-size:0.8rem; font-weight:normal; color:#888;">第<span id="race-count-display">0</span>回 レース</span>
        </div>
        <div class="coin-display" style="display:flex; flex-direction:column; align-items:flex-end;">
            <div><span class="coin-icon">💰</span> <span id="coin-count">0</span></div>
            <div style="font-size:0.75rem; color:#aaa;">目標: 10,000</div>
        </div>
    </header>

    <main id="game-container">
        <!-- 画面1: 厩務 (資金稼ぎ) -->
        <section id="stable-screen" class="screen">
            <div class="glass-card">
                <h2>厩舎の清掃</h2>
                <p>所持金が10コイン以下の時のみ、ここをタップして資金を貯めることができます。</p>
            </div>
            <div id="dirt-field" class="dirt-container">
                <!-- ターゲットがここに出現 -->
            </div>
        </section>

        <!-- 画面2: パドック (レース選択) -->
        <section id="paddock-screen" class="screen active">
            <div class="glass-card">
                <h2 id="race-title-display">出馬表</h2>
                <p>次のレースに出走する馬たちです。距離への適性（SP/ST）や調子をチェックしましょう。</p>
            </div>
            <div class="horse-list glass-card" id="horse-entry-list">
                <!-- 馬のリストがJSで挿入される -->
            </div>
            <div style="text-align: center;">
                <button id="go-betting-btn" class="btn btn-primary">馬券購入へ</button>
            </div>
        </section>

        <!-- 画面3: 馬券購入 -->
        <section id="betting-screen" class="screen">
            <div class="glass-card">
                <h2>馬券購入</h2>
                <div id="bet-tabs">
                    <button class="btn active" data-tab="win">単勝</button>
                    <!-- 他の馬券タイプもここに追加予定 -->
                </div>
            </div>
            <div id="betting-interface" class="glass-card">
                <!-- オッズと入力フォーム -->
            </div>
            <div style="text-align: center; gap: 1rem; display: flex; justify-content: center;">
                <button id="back-paddock-btn" class="btn">戻る</button>
                <button id="start-race-btn" class="btn btn-primary">レース開始！</button>
            </div>
        </section>

        <!-- 画面4: レース実況 -->
        <section id="race-screen" class="screen">
            <div id="race-view" style="position: relative; flex: 1; border-radius: 12px; overflow: hidden;">
                <canvas id="race-canvas"></canvas>
                <div id="commentary" style="position: absolute; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-size: 0.9rem;">
                    実況: 各馬ゲートに入ります...
                </div>
            </div>
        </section>

        <!-- 画面5: リザルト -->
        <section id="result-screen" class="screen">
            <div class="glass-card" style="text-align: center;">
                <h1 id="winner-announce">優勝: 馬名</h1>
                <div id="payout-details" style="margin: 2rem 0; font-size: 1.5rem;">
                    払戻金: <span class="coin-icon">💰</span><span id="payout-amount">0</span>
                </div>
                <button id="next-race-btn" class="btn btn-primary">次のレースへ</button>
            </div>
        </section>
    </main>

    <nav>
        <div class="nav-item" id="nav-stable">厩務(小銭稼ぎ)</div>
        <div class="nav-item active" id="nav-race">競馬場</div>
    </nav>

// --- Application State ---
let state = {
    coins: 10,
    tapReward: 1,
    currentRace: null,
    bets: [],
    history: {}, // 馬ごとのこれまでの戦績 { horseId: { wins: 0, total: 0 } }
    lastConditions: {}, // { horseId: condition }

// --- Dom Elements ---
const screens = document.querySelectorAll('.screen');
const navItems = document.querySelectorAll('.nav-item');
const coinLabel = document.getElementById('coin-count');
const dirtField = document.getElementById('dirt-field');
const entryList = document.getElementById('horse-entry-list');
const canvas = document.getElementById('race-canvas');
const ctx = canvas.getContext('2d');

// --- Initialization ---
function init() {
    console.log("Legend of Turf - Game Init");
    loadGame();
    updateUI();
    spawnDirtLoop();
    
    // Add Event Listeners
    navItems.forEach(item => {
        item.addEventListener('click', () => switchTab(item.id));
    });

    document.getElementById('go-betting-btn').addEventListener('click', () => switchScreen('betting-screen'));
    document.getElementById('back-paddock-btn').addEventListener('click', () => switchScreen('paddock-screen'));
    document.getElementById('start-race-btn').addEventListener('click', startRace);

    // 初期画面がパドックなので準備
    prepareRace();
}

// --- Screen Management ---
function switchScreen(screenId) {
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function switchTab(navId) {
    navItems.forEach(n => n.classList.remove('active'));
    document.getElementById(navId).classList.add('active');
    
    if (navId === 'nav-stable') switchScreen('stable-screen');
    if (navId === 'nav-race') switchScreen('paddock-screen');
}

// --- Labor (Stable) Logic ---
function spawnDirtLoop() {
    setInterval(() => {
        if (state.coins > 10) return;
        if (document.getElementById('stable-screen').classList.contains('active')) {
            createDirt();
        }
    }, 1500);
}

function createDirt() {
    const dirt = document.createElement('div');
    dirt.className = 'dirt';
    const rect = dirtField.getBoundingClientRect();
    const x = Math.random() * (rect.width - 40);
    const y = Math.random() * (rect.height - 40);
    dirt.style.left = `${x}px`;
    dirt.style.top = `${y}px`;
    
    dirt.onclick = (e) => {
        e.stopPropagation();
        state.coins += state.tapReward;
        updateUI();
        saveGame(); // オートセーブ
        dirt.remove();
    };
    
    dirtField.appendChild(dirt);
    setTimeout(() => { if(dirt.parentElement) dirt.remove(); }, 4000);
}

// --- Race Preparation ---
const RACE_TYPES = [
    { name: "スプリントステークス", distance: 1200, label: "短距離", spWeight: 0.7, stWeight: 0.1, gtWeight: 0.2 },
    { name: "マイラーズカップ", distance: 1600, label: "マイル", spWeight: 0.5, stWeight: 0.3, gtWeight: 0.2 },
    { name: "クラシックカップ", distance: 2000, label: "中距離", spWeight: 0.3, stWeight: 0.5, gtWeight: 0.2 },
    { name: "ステイヤーズステークス", distance: 2400, label: "長距離", spWeight: 0.1, stWeight: 0.7, gtWeight: 0.2 }
];

function prepareRace() {
    const raceType = RACE_TYPES[Math.floor(Math.random() * RACE_TYPES.length)];
    const shuffled = [...HORSES].sort(() => 0.5 - Math.random());
    let entries = shuffled.slice(0, 8).map(horse => {
        // 調子を 1-5 に設定（内部データ）
        const conditionValue = Math.floor(Math.random() * 5) + 1;
        const lastCond = state.lastConditions[horse.id] || 3;
        
        let arrow = "→";
        if (conditionValue > lastCond) arrow = "↑";
        else if (conditionValue < lastCond) arrow = "↓";
        
        // ステータスから割り出される強さの目安を人気に反映
        const estimatedStrength = (horse.speed * raceType.spWeight) + (horse.stamina * raceType.stWeight) + (horse.guts * raceType.gtWeight);
        const popBase = estimatedStrength;

        // 次回のために現在の調子を保存
        state.lastConditions[horse.id] = conditionValue;

        return {
            ...horse,
            condition: conditionValue,
            conditionTxt: arrow, // 数字は表示せず矢印のみにする
            popBase: popBase
        };
    });

    state.currentRace = {
        name: raceType.name,
        label: raceType.label,
        distance: raceType.distance,
        type: raceType,
        entries: entries,
        bets: [],
        status: 'betting'
    };

    renderPaddock();
    calculateOdds();
    saveGame(); // 調子などを保存
}

function renderPaddock() {
    const title = document.getElementById('race-title-display');
    if (title && state.currentRace.name) {
        title.innerHTML = `${state.currentRace.name} <span style="font-size:1rem; color:var(--accent-gold);">(${state.currentRace.distance}m / ${state.currentRace.label})</span>`;
    }

    entryList.innerHTML = '';
    state.currentRace.entries.forEach((horse, index) => {
        const item = document.createElement('div');
        item.className = 'horse-item';
        // 調子 4, 5 を UP、1, 2 を DOWN とする
        const condClass = horse.condition >= 4 ? 'condition-up' : (horse.condition <= 2 ? 'condition-down' : '');
        
        const placements = (state.recentPlacements && state.recentPlacements[horse.id]) ? state.recentPlacements[horse.id] : [];
        const placeText = placements.length > 0 
            ? placements.map(p => p <= 3 ? `<span style="color:var(--accent-gold); font-weight:bold;">${p}着</span>` : `${p}着`).join(' - ')
            : '初出走';

        const getGrade = val => {
            if (val >= 115) return '<span style="color:#ff4500;font-weight:bold;">S</span>';
            if (val >= 100) return '<span style="color:#ff1493;font-weight:bold;">A</span>';
            if (val >= 85) return '<span style="color:#ff8c00;font-weight:bold;">B</span>';
            if (val >= 70) return '<span style="color:#32cd32;font-weight:bold;">C</span>';
            if (val >= 55) return '<span style="color:#1e90ff;font-weight:bold;">D</span>';
            return '<span style="color:#808080;font-weight:bold;">E</span>';
        };

        const statsHtml = `[<span style="color:white">${horse.type}</span>] SP:${getGrade(horse.speed)} ST:${getGrade(horse.stamina)} GT:${getGrade(horse.guts)}`;

        item.innerHTML = `
            <div>${index + 1}</div>
            <div>
                <div style="font-weight:bold; font-size:1.0rem; margin-bottom:2px;">${horse.name}</div>
                <div style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:1px;">${statsHtml}</div>
                <div style="font-size:0.75rem; color:var(--text-secondary);">近走: ${placeText}</div>
            </div>
            <div class="${condClass}" style="text-align:center; font-size:1.2rem;">${horse.conditionTxt}</div>
            <div id="odds-${horse.id}">--</div>
        `;
        entryList.appendChild(item);
    });

    // 履歴を表示
    renderHistory();
}

function renderHistory() {
    let historyEl = document.getElementById('race-history-list');
    if (!historyEl) {
        const container = document.createElement('div');
        container.className = 'glass-card';
        container.style.marginTop = '2rem';
        container.innerHTML = `
            <h3>過去5試合の結果</h3>
            <div id="race-history-list" style="font-size: 0.85rem; color: #ccc;">
            </div>
        `;
        entryList.parentElement.appendChild(container);
        historyEl = document.getElementById('race-history-list');
    }

    if (state.recentResults.length === 0) {
        historyEl.innerHTML = '<p>まだレース履歴がありません。</p>';
        return;
    }

    historyEl.innerHTML = state.recentResults.slice().reverse().map((res, i) => `
        <div style="border-bottom: 1px solid #444; padding: 8px 0;">
            <div style="color: var(--accent-gold); font-weight: bold;">[RACE ${state.recentResults.length - i}]</div>
            1着: ${res.winner} / 2着: ${res.runnerUp} / 3着: ${res.third}
        </div>
    `).join('');
}

// --- Odds (Parimutuel Simulation) ---
function calculateOdds() {
    const totalPool = { win: 0, quinella: 0 };
    const horseBets = {};
    const quinellaBets = {};

    state.currentRace.entries.forEach(h => {
        const weight = h.popBase * (0.8 + (h.condition * 0.1));
        const npcBet = Math.floor(weight * 100);
        horseBets[h.id] = npcBet;
        totalPool.win += npcBet;
    });

    for(let i=0; i<state.currentRace.entries.length; i++) {
        for(let j=i+1; j<state.currentRace.entries.length; j++) {
            const h1 = state.currentRace.entries[i];
            const h2 = state.currentRace.entries[j];
            const key = `${Math.min(h1.id, h2.id)}-${Math.max(h1.id, h2.id)}`;
            const weight = (h1.popBase + h2.popBase) / 2 * (0.8 + (h1.condition + h2.condition) * 0.05);
            const npcBet = Math.floor(weight * 50);
            quinellaBets[key] = npcBet;
            totalPool.quinella += npcBet;
        }
    }

    state.currentRace.odds = { win: {}, quinella: {} };
    
    state.currentRace.entries.forEach((h, index) => {
        const odds = (totalPool.win * 0.8) / horseBets[h.id];
        h.currentOdds = Math.max(1.1, odds).toFixed(1);
        state.currentRace.odds.win[index + 1] = h.currentOdds; // インデックスを使用
        const oddsEl = document.getElementById(`odds-${h.id}`);
        if(oddsEl) oddsEl.innerText = `${h.currentOdds}x`;
    });

    for(let key in quinellaBets) {
        const odds = (totalPool.quinella * 0.75) / quinellaBets[key];
        // キーを出走順序ベースに変更
        const horseIndices = key.split('-').map(id => state.currentRace.entries.findIndex(e => e.id == id) + 1).sort((a,b)=>a-b);
        const orderKey = `${horseIndices[0]}-${horseIndices[1]}`;
        state.currentRace.odds.quinella[orderKey] = Math.max(2.0, odds).toFixed(1);
    }
}

// --- Betting UI ---
let currentBetTab = 'win';
function renderBettingInterface() {
    const ui = document.getElementById('betting-interface');
    ui.innerHTML = '';
    
    const tabs = document.createElement('div');
    tabs.style.display = 'flex';
    tabs.style.gap = '10px';
    tabs.style.marginBottom = '10px';
    ['win', 'quinella'].forEach(t => {
        const btn = document.createElement('button');
        btn.className = `btn ${currentBetTab === t ? 'active' : ''}`;
        btn.innerText = t === 'win' ? '単勝' : '馬連';
        btn.onclick = () => { currentBetTab = t; renderBettingInterface(); };
        tabs.appendChild(btn);
    });
    ui.appendChild(tabs);

    const list = document.createElement('div');
    list.className = 'horse-list';
    
    if (currentBetTab === 'win') {
        state.currentRace.entries.forEach((h, index) => {
            const div = document.createElement('div');
            div.className = 'horse-item';
            div.innerHTML = `
                <div>${index + 1}</div> <div>${h.name}</div>
                <div style="color:var(--accent-gold)">${h.currentOdds}x</div>
                <input type="number" min="0" placeholder="金額" class="bet-input" data-type="win" data-id="${index + 1}" style="width:100%; padding:4px; background:#333; color:white; border:1px solid #555;">
            `;
            list.appendChild(div);
        });
    } else {
        const combinations = [];
        for(let i=0; i<state.currentRace.entries.length; i++) {
            for(let j=i+1; j<state.currentRace.entries.length; j++) {
                const h1Index = i + 1;
                const h2Index = j + 1;
                const key = `${h1Index}-${h2Index}`;
                combinations.push({ key, name: `${h1Index}-${h2Index}`, odds: state.currentRace.odds.quinella[key] });
            }
        }
        combinations.sort((a,b) => a.odds - b.odds).slice(0, 15).forEach(c => {
            const div = document.createElement('div');
            div.className = 'horse-item';
            div.innerHTML = `
                <div>${c.name}</div> <div>馬連</div>
                <div style="color:var(--accent-gold)">${c.odds}x</div>
                <input type="number" min="0" placeholder="枚" class="bet-input" data-type="quinella" data-id="${c.key}" style="width:100%; padding:4px; background:#333; color:white; border:1px solid #555;">
            `;
            list.appendChild(div);
        });
    }
    ui.appendChild(list);
}

// Override switchScreen for betting
const originalSwitchScreen = switchScreen;
switchScreen = function(screenId) {
    if (screenId === 'betting-screen') renderBettingInterface();
    originalSwitchScreen(screenId);
}

// --- Race Engine ---
let raceId = null;
function startRace() {
    const inputs = document.querySelectorAll('.bet-input');
    state.bets = [];
    inputs.forEach(input => {
        const amount = parseInt(input.value) || 0;
        if (amount > 0) {
            if (state.coins < amount) {
                alert("コインが足りません！");
                return;
            }
            state.coins -= amount;
            state.bets.push({ type: input.dataset.type, id: input.dataset.id, amount: amount });
        }
    });

    updateUI();
    saveGame(); // オートセーブ
    switchScreen('race-screen');
    runRaceSimulation();
}

function runRaceSimulation() {
    const canvas = document.getElementById('race-canvas');
    const ctx = canvas.getContext('2d');
    const commentary = document.getElementById('commentary');
    const finishLineX = canvas.parentElement.clientWidth * 0.85;
    
    // キャンバスのサイズ設定
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;

    const entries = state.currentRace.entries.map((h, i) => ({
        ...h,
        progress: 0, // 0 to 100
        finished: false,
        rank: 0,
        power: ((h.speed * state.currentRace.type.spWeight) + (h.stamina * state.currentRace.type.stWeight) + (h.guts * state.currentRace.type.gtWeight)) * (0.9 + h.condition * 0.05),
        entryNo: i + 1
    }));

    let finishedCount = 0;
    const barHeight = 25;
    const spacing = (canvas.height - 60) / 8;

    function animate() {
        ctx.fillStyle = "#111"; // 背景を少し暗く
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // ゴールライン
        ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(finishLineX, 0);
        ctx.lineTo(finishLineX, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        entries.forEach((h, i) => {
            if (!h.finished) {
                // スピードをさらに落とす (/1000 -> /2500)
                let step = (h.power / 2500); 
                
                // 区間ごとの脚質の有利
                if (h.type === "逃" && h.progress < 40) step *= 1.2;
                if (h.type === "追" && h.progress > 70) step *= 1.5;
                
                // ランダムな揺らぎ（接戦演出）
                h.progress += step + (Math.random() * 0.1);

                if (h.progress >= 100) {
                    h.finished = true;
                    h.rank = ++finishedCount;
                    h.progress = 100;
                }
            }

            const y = 40 + i * spacing;
            const currentWidth = (h.progress / 100) * finishLineX;
            
            // 棒の描画
            ctx.fillStyle = h.color;
            ctx.fillRect(100, y, currentWidth, barHeight);
            
            // 出走番号と馬名
            ctx.fillStyle = "white";
            ctx.font = "bold 13px sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(`${h.entryNo}. ${h.name.substring(0,6)}`, 90, y + 17);
            
            // 順位表示
            if (h.finished) {
                ctx.textAlign = "left";
                ctx.fillStyle = h.rank === 1 ? "gold" : "white";
                ctx.fillText(`${h.rank}着`, 110 + currentWidth, y + 17);
            }
        });

        // 実況
        const leader = [...entries].sort((a,b) => b.progress - a.progress)[0];
        if (leader.progress < 50) commentary.innerText = `実況: 最初は緩やかな立ち上がり... 先頭は${leader.name}！`;
        else if (leader.progress < 90) commentary.innerText = `実況: 勝負どころ！ 各馬一斉にスパート！`;
        else commentary.innerText = `実況: さあ直線！ 接戦です！`;

        if (finishedCount < entries.length) {
            raceId = requestAnimationFrame(animate);
        } else {
            // 少し待ってから結果発表
            setTimeout(() => {
                showResult(entries.sort((a,b) => a.rank - b.rank));
            }, 1000);
        }
    }

    animate();
}

function showResult(sortedEntries) {
    const winner = sortedEntries[0];
    const second = sortedEntries[1];
    document.getElementById('winner-announce').innerText = `1着: ${winner.name}\n2着: ${second.name}`;

    // 履歴に追加 (上位3着)
    state.recentResults.push({
        winner: winner.name,
        runnerUp: second.name,
        third: sortedEntries[2].name
    });
    if (state.recentResults.length > 5) state.recentResults.shift();

    // 各馬の近走成績を記録
    if (!state.recentPlacements) state.recentPlacements = {};
    sortedEntries.forEach((h, i) => {
        if (!state.recentPlacements[h.id]) state.recentPlacements[h.id] = [];
        state.recentPlacements[h.id].unshift(i + 1); // 1番前に最新の結果を追加
        if (state.recentPlacements[h.id].length > 5) state.recentPlacements[h.id].pop();
    });

    let totalPayout = 0;
    state.bets.forEach(bet => {
        if (bet.type === 'win') {
            const winnerIdx = winner.entryNo;
            if (parseInt(bet.id) === winnerIdx) {
                totalPayout += Math.floor(bet.amount * parseFloat(state.currentRace.odds.win[winnerIdx]));
            }
        } else if (bet.type === 'quinella') {
            const w1Idx = winner.entryNo;
            const w2Idx = second.entryNo; 
            const combo = [w1Idx, w2Idx].sort((a,b)=>a-b);
            const key = `${combo[0]}-${combo[1]}`;
            if (bet.id === key) {
                totalPayout += Math.floor(bet.amount * parseFloat(state.currentRace.odds.quinella[key]));
            }
        }
    });

    state.raceCount = (state.raceCount || 0) + 1;
    state.coins += totalPayout;
    document.getElementById('payout-amount').innerText = totalPayout;
    
    updateUI();
    saveGame();
    switchScreen('result-screen');
    
    document.getElementById('next-race-btn').onclick = () => {
        prepareRace();
        switchTab('nav-race');
    };
}

// --- Utils ---
function updateUI() {
    coinLabel.innerText = state.coins.toLocaleString();
    const raceCountEl = document.getElementById('race-count-display');
    if (raceCountEl) raceCountEl.innerText = state.raceCount || 0;

    if (state.coins >= 10000 && !state.gameCleared) {
        state.gameCleared = true;
        setTimeout(() => {
            alert(`おめでとうございます！\n${state.raceCount || 0}回のレースで10,000コインを達成しました！`);
        }, 500);
    }
}

function saveGame() {
    try {
        localStorage.setItem('horse-racing-save', JSON.stringify(state));
    } catch (e) {
        console.error("Save failed:", e);
    }
}

function loadGame() {
    try {
        const saved = localStorage.getItem('horse-racing-save');
        if (saved) {
            const parsed = JSON.parse(saved);
            state = { ...state, ...parsed };
            console.log("Game Loaded Successfully");
        } else {
            // 初めてのプレイ時のみ10コイン
            state.coins = 10;
        }
    } catch (e) {
        console.warn("Load failed or no save data:", e);
    }

    // 初期の過去5レース結果（予想指標用）を用意する
    if (state.recentResults.length === 0) {
        for (let i = 0; i < 5; i++) {
            let mockRace = [...HORSES].sort(() => 0.5 - Math.random()).slice(0, 8);
            // 内部的な強さにランダム要素を足して順位を決定
            mockRace.forEach(m => m.tempScore = ((m.speed + m.stamina + m.guts) / 3) + Math.random() * 30);
            mockRace.sort((a, b) => b.tempScore - a.tempScore);
            state.recentResults.push({
                winner: mockRace[0].name,
                runnerUp: mockRace[1].name,
                third: mockRace[2].name
            });
        }
    }

    // 初期の近走成績（各馬の個別データ）を用意する
    if (!state.recentPlacements || Object.keys(state.recentPlacements).length === 0) {
        state.recentPlacements = {};
        HORSES.forEach(h => {
            const places = [];
            const strengthVal = (h.speed + h.stamina + h.guts) / 3;
            for(let i=0; i<5; i++) {
                // 強さに応じてランダムな着順を生成 (強いほど上に、弱いほど下に)
                // ステータス平均は 40〜120 程度
                let baseRank = 8 - (strengthVal - 40) / 10;
                let rank = Math.round(baseRank + (Math.random() * 4 - 2));
                rank = Math.max(1, Math.min(8, rank));
                places.push(rank);
            }
            state.recentPlacements[h.id] = places;
        });
        saveGame();
    }
}

// Start
init();
    </script>
